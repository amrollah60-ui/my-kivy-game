name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # استفاده از نسخه پایدارتر لینوکس برای هماهنگی کامل

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # هماهنگ‌ترین نسخه با کیوی و بویلدوزر

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev libbz2-dev

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" virtualenv
        pip install git+https://github.com/kivy/buildozer.git # نصب آخرین نسخه مستقیم از گیت‌هاب بویلدوزر

    - name: Configure buildozer.spec
      run: |
        # اصلاح مسیرهای اندروید و حذف کتابخانه‌های خراب قدیمی به صورت ریشه‌ای
        sed -i 's/requirements = .*/requirements = python3,kivy==2.3.0,plyer,pillow/g' buildozer.spec
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        
    - name: Build Android APK
      run: |
        # اجرای ایمن با اضافه کردن مسیر به محیط لینوکس
        export PATH=$PATH:~/.local/bin/
        buildozer -v android debug

    - name: Upload APK Artifact
      if: always() # حتی اگر ارور داد فایل لاگ رو بده تا ببینیم چشه
      uses: actions/upload-artifact@v4
      with:
        name: leprecoin-apk
        path: bin/*.apk
